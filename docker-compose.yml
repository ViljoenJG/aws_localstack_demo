services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - DEBUG=0
      - DOCKER_HOST=unix:///var/run/docker.sock
    privileged: true
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./lambdas:/opt/lambdas"
      # - "./init-hooks:/etc/localstack/init"
